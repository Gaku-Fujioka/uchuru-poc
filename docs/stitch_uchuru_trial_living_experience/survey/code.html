<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>uchuru - 滞在後アンケート</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700&amp;family=Noto+Sans:wght@400&amp;family=Space+Grotesk:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Checkbox Styling */
        .custom-checkbox input[type="radio"] {
            display: none;
        }
        .custom-checkbox input[type="radio"]:checked + .checkbox-body {
            border-color: #003634; /* primary */
            background-color: #baece9; /* primary-fixed */
        }
        .custom-checkbox input[type="radio"]:checked + .checkbox-body .check-icon {
            opacity: 1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#944a00",
                        "tertiary-fixed": "#e6e2d9",
                        "inverse-surface": "#303030",
                        "on-tertiary-fixed": "#1c1c17",
                        "tertiary-container": "#474640",
                        "secondary-fixed-dim": "#ffb783",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e4e2e2",
                        "primary": "#003634",
                        "primary-container": "#1b4d4b",
                        "outline-variant": "#c0c8c7",
                        "on-background": "#1b1c1c",
                        "on-primary-fixed-variant": "#1c4e4c",
                        "tertiary-fixed-dim": "#c9c6be",
                        "on-tertiary-fixed-variant": "#484741",
                        "inverse-on-surface": "#f2f0f0",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#366664",
                        "background": "#fbf9f8",
                        "on-primary-fixed": "#00201f",
                        "on-surface": "#1b1c1c",
                        "primary-fixed": "#baece9",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#663100",
                        "on-surface-variant": "#404848",
                        "error-container": "#ffdad6",
                        "surface-container": "#efeded",
                        "surface-container-low": "#f5f3f3",
                        "tertiary": "#31302a",
                        "on-tertiary-container": "#b7b4ac",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "surface-variant": "#e4e2e2",
                        "on-primary-container": "#8cbdba",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#301400",
                        "surface-container-high": "#eae8e7",
                        "outline": "#707978",
                        "secondary-container": "#fc8f34",
                        "surface-dim": "#dbd9d9",
                        "surface": "#fbf9f8",
                        "surface-bright": "#fbf9f8",
                        "secondary-fixed": "#ffdcc5",
                        "on-secondary-fixed-variant": "#713700",
                        "inverse-primary": "#9ed0cd",
                        "primary-fixed-dim": "#9ed0cd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    "spacing": {
                        "container-margin": "20px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "gutter": "16px",
                        "stack-sm": "12px",
                        "base": "8px",
                        "safe-bottom": "env(safe-area-inset-bottom)"
                    },
                    "fontFamily": {
                        "headline-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Be Vietnam Pro"],
                        "body-lg": ["Noto Sans"],
                        "mission-title": ["Be Vietnam Pro"],
                        "label-caps": ["Space Grotesk"],
                        "body-md": ["Noto Sans"],
                        "headline-lg-mobile": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "mission-title": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg-mobile": ["26px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed pb-[calc(80px+env(safe-area-inset-bottom))]">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-background dark:bg-background z-40 relative">
<div class="flex justify-between items-center px-container-margin h-16 w-full max-w-7xl mx-auto">
<button class="text-primary dark:text-inverse-primary hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary tracking-tight">uchuru</div>
<button class="text-primary dark:text-inverse-primary hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">person</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start pt-stack-md pb-stack-lg px-container-margin max-w-3xl mx-auto w-full relative">
<!-- Background decorative element (Notebook texture hint) -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: repeating-linear-gradient(transparent, transparent 31px, #003634 31px, #003634 32px); background-size: 100% 32px; z-index: -1;"></div>
<!-- Header Section -->
<div class="text-center mb-stack-lg w-full">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-stack-sm">滞在後アンケート</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">大阪での生活はいかがでしたか？体験を振り返ってみましょう。</p>
</div>
<!-- Survey Container (Tactile Paper feel) -->
<div class="bg-surface-container-lowest rounded-3xl p-stack-md md:p-stack-lg w-full shadow-[0_4px_20px_0_rgba(0,54,52,0.04)] border border-surface-container-low relative overflow-hidden transition-all duration-500" id="survey-container">
<!-- Progress Tracker (Dotted path style) -->
<div class="flex justify-between items-center mb-stack-lg relative px-4">
<div class="absolute left-8 right-8 top-1/2 -translate-y-1/2 h-[2px] bg-surface-variant border-t-2 border-dashed border-surface-variant z-0"></div>
<div class="absolute left-8 right-8 top-1/2 -translate-y-1/2 h-[2px] bg-primary z-0 transition-all duration-300 w-0" id="progress-line"></div>
<div class="relative z-10 w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-caps text-label-caps shadow-sm" data-step="1">1</div>
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-caps text-label-caps" data-step="2">2</div>
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-caps text-label-caps" data-step="3">3</div>
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-caps text-label-caps" data-step="4">4</div>
<div class="relative z-10 w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-caps text-label-caps" data-step="5">5</div>
</div>
<!-- Survey Form -->
<form class="space-y-stack-lg" id="post-stay-survey">
<!-- Question 1 -->
<div class="question-step" data-step="1">
<h2 class="font-mission-title text-mission-title text-primary mb-stack-md text-center">この地域にまた来たいですか？</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<label class="custom-checkbox cursor-pointer block">
<input name="come_back" type="radio" value="yes"/>
<div class="checkbox-body border-2 border-surface-variant rounded-xl p-4 flex items-center transition-all hover:bg-surface-container-low h-full">
<div class="w-6 h-6 rounded-full border-2 border-outline flex-shrink-0 mr-4 flex items-center justify-center">
<span class="check-icon material-symbols-outlined text-primary text-[16px] opacity-0 transition-opacity">circle</span>
</div>
<span class="font-body-md text-body-md text-on-surface">はい、ぜひ来たい</span>
</div>
</label>
<label class="custom-checkbox cursor-pointer block">
<input name="come_back" type="radio" value="maybe"/>
<div class="checkbox-body border-2 border-surface-variant rounded-xl p-4 flex items-center transition-all hover:bg-surface-container-low h-full">
<div class="w-6 h-6 rounded-full border-2 border-outline flex-shrink-0 mr-4 flex items-center justify-center">
<span class="check-icon material-symbols-outlined text-primary text-[16px] opacity-0 transition-opacity">circle</span>
</div>
<span class="font-body-md text-body-md text-on-surface">またいつか来たい</span>
</div>
</label>
</div>
</div>
<!-- Navigation Buttons -->
<div class="flex justify-end mt-stack-lg">
<button class="bg-primary hover:bg-primary-container text-on-primary font-label-caps text-label-caps py-3 px-6 rounded-full shadow-sm hover:shadow transition-all flex items-center gap-2" id="next-btn" type="button">
                        次へ
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<button class="hidden bg-secondary hover:bg-[#7a3d00] text-on-secondary font-label-caps text-label-caps py-3 px-6 rounded-full shadow-md hover:shadow-lg transition-all flex items-center gap-2" id="submit-btn" type="button">
                        結果を見る
                        <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
</button>
</div>
</form>
</div>
<!-- Result Card (Hidden initially) -->
<div class="hidden w-full max-w-2xl mx-auto mt-stack-md flex flex-col items-center" id="result-card">
<div class="w-full bg-surface-container-lowest rounded-3xl p-stack-lg shadow-[0_8px_30px_0_rgba(0,54,52,0.08)] border border-primary-fixed relative overflow-hidden text-center transform scale-95 opacity-0 transition-all duration-700 ease-out" id="result-content">
<!-- Confetti/Celebration hint -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-secondary-fixed via-transparent to-transparent"></div>
<div class="w-24 h-24 mx-auto mb-stack-md rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center shadow-lg transform -rotate-12">
<span class="material-symbols-outlined fill text-[48px]">local_activity</span>
</div>
<h2 class="font-label-caps text-label-caps text-secondary tracking-widest uppercase mb-2">診断完了</h2>
<h3 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-stack-md">
                    あなたは「大阪の関係人口候補」です
                </h3>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg max-w-md mx-auto">
                    地域文化への好奇心と繋がりを求める姿勢は、大阪との深いつながりを築く大きな可能性を示しています。これは単なる旅行ではなく、繋がりの始まりです。
                </p>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-stack-sm justify-center">
<button class="bg-primary hover:bg-primary-container text-on-primary font-label-caps text-label-caps py-3 px-8 rounded-full shadow-sm transition-all">
                        地域の交流イベントを探す
                    </button>
<button class="bg-surface hover:bg-surface-container text-primary border border-outline-variant font-label-caps text-label-caps py-3 px-8 rounded-full transition-all">
                        トップに戻る
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full bg-surface-container-lowest border-t border-surface-container z-50 pb-safe-bottom">
<div class="flex justify-around items-center h-16 max-w-3xl mx-auto px-2">
<button class="flex flex-col items-center justify-center w-full h-full text-primary gap-1">
<span class="material-symbols-outlined text-[24px] fill">home</span>
<span class="text-[10px] font-medium">トップ</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors gap-1">
<span class="material-symbols-outlined text-[24px]">location_on</span>
<span class="text-[10px] font-medium">住んでみる候補</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors gap-1">
<span class="material-symbols-outlined text-[24px]">task_alt</span>
<span class="text-[10px] font-medium">生活ミッション</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors gap-1">
<span class="material-symbols-outlined text-[24px]">analytics</span>
<span class="text-[10px] font-medium">PoC結果</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-on-surface-variant hover:text-primary transition-colors gap-1">
<span class="material-symbols-outlined text-[24px]">person</span>
<span class="text-[10px] font-medium">プロフィール</span>
</button>
</div>
</nav>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            const surveyForm = document.getElementById('post-stay-survey');
            const surveyContainer = document.getElementById('survey-container');
            const resultCard = document.getElementById('result-card');
            const resultContent = document.getElementById('result-content');
            
            // Simple mockup interaction for next step
            nextBtn.addEventListener('click', () => {
                // In a real app, validate and move to next step. Here we just jump to submit for demo purposes.
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
                
                // Update progress visually for demo
                const progressLine = document.getElementById('progress-line');
                progressLine.style.width = '100%';
                
                document.querySelectorAll('[data-step]').forEach(el => {
                    if(el.classList.contains('w-8')) {
                        el.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
                        el.classList.add('bg-primary', 'text-on-primary');
                    }
                });
            });

            submitBtn.addEventListener('click', () => {
                surveyContainer.style.opacity = '0';
                surveyContainer.style.transform = 'translateY(-20px)';
                
                setTimeout(() => {
                    surveyContainer.classList.add('hidden');
                    resultCard.classList.remove('hidden');
                    
                    // Trigger animation
                    setTimeout(() => {
                        resultContent.classList.remove('scale-95', 'opacity-0');
                        resultContent.classList.add('scale-100', 'opacity-100');
                    }, 50);
                }, 500);
            });
        });
    </script>
</body></html>
